name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare environment
        run: cp backend/.env.example backend/.env

      - name: Build API container
        run: docker compose build api

      - name: Verify formatting in container
        run: |
          docker compose run --rm api sh -lc '
            fmt_output="$(gofmt -l .)"
            if [ -n "$fmt_output" ]; then
              echo "These files are not formatted with gofmt:"
              echo "$fmt_output"
              exit 1
            fi
          '

      - name: Run unit tests in container
        run: docker compose run --rm api go test -short ./...

      - name: Run golangci-lint in container
        run: docker compose run --rm api golangci-lint run ./...

      - name: Tear down containers
        if: always()
        run: docker compose down -v
