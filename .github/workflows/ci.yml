name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ahmedwahdan/ledgernest-ci:sha-97aaccf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify formatting
        working-directory: backend
        run: |
          fmt_output="$(gofmt -l .)"
          if [ -n "$fmt_output" ]; then
            echo "These files are not formatted with gofmt:"
            echo "$fmt_output"
            exit 1
          fi

      - name: Download modules
        working-directory: backend
        run: go mod download

      - name: Run unit tests
        working-directory: backend
        run: go test -short ./...

      - name: Run golangci-lint
        working-directory: backend
        run: golangci-lint run ./...
