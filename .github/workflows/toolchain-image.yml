name: Publish CI Toolchain Image

on:
  push:
    branches:
      - dev
    paths:
      - backend/Dockerfile.ci
      - .github/workflows/toolchain-image.yml
  pull_request:
    paths:
      - backend/Dockerfile.ci
      - .github/workflows/toolchain-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  toolchain-image:
    name: Build Toolchain Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ledgernest-ci
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push toolchain image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.ci
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
