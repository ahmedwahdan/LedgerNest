root = "."
tmp_dir = "tmp"

[build]
  bin            = "./tmp/main"
  cmd            = "go build -o ./tmp/main ./cmd/api"
  delay          = 200
  exclude_dir    = ["tmp", "vendor", "test", "db"]
  exclude_file   = []
  exclude_regex  = ["_test\\.go"]
  include_ext    = ["go"]
  kill_delay     = 500
  log            = "build-errors.log"
  rerun          = false
  rerun_delay    = 500
  send_interrupt = true
  stop_on_error  = true

[color]
  app     = "white"
  build   = "yellow"
  main    = "magenta"
  runner  = "green"
  watcher = "cyan"

[log]
  main_only = false
  time      = true

[misc]
  clean_on_exit     = true
  unique_build_errors = true

[screen]
  clear_on_rebuild = true
  keep_scroll      = true
