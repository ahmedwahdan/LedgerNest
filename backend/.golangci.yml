run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    # Correctness
    - errcheck        # unchecked errors
    - govet           # go vet checks
    - staticcheck     # static analysis
    - ineffassign     # unused assignments
    - unused          # unused code
    # Style
    - gofmt           # formatting
    - goimports       # import grouping + formatting
    - revive          # general linter (replaces golint)
    - misspell        # spelling mistakes in comments
    - gocritic        # opinionated style checks
    # Safety
    - bodyclose       # unclosed HTTP response bodies
    - sqlclosecheck   # unclosed sql.Rows / sql.Stmt
    - noctx           # http.Request without context
    - gosec           # security issues

linters-settings:
  goimports:
    local-prefixes: github.com/wahdan/expenses-api

  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: error-return
        severity: warning

  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - commentedOutCode
      - whyNoLint

  gosec:
    excludes:
      - G104  # errors unhandled (duplicate of errcheck)

issues:
  exclude-rules:
    # Relax rules in test files
    - path: _test\.go
      linters:
        - errcheck
        - gosec

  max-issues-per-linter: 50
  max-same-issues: 10
