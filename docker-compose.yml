services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: expenses
      POSTGRES_DB: expenses_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses -d expenses_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API (Go — dev with hot reload) ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    volumes:
      - ./backend:/app                        # live source mount
      - go_cache:/root/go/pkg/mod             # module cache persists across restarts
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://expenses:expenses@postgres:5432/expenses_dev?sslmode=disable
      TEST_DATABASE_URL: postgres://expenses:expenses@postgres:5432/expenses_test?sslmode=disable
      REDIS_URL: redis://redis:6379

volumes:
  postgres_data:
  redis_data:
  go_cache:
